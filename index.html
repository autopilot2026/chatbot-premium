<script>
function openChat() {
    document.getElementById("chatBox").style.display = "flex";
}

function closeChat() {
    document.getElementById("chatBox").style.display = "none";
}

async function sendMessage() {
    let msg = document.getElementById("userMessage").value;
    if (!msg.trim()) return;

    let box = document.getElementById("chatMessages");
    box.innerHTML += "<div><b>Tu:</b> " + msg + "</div>";
    document.getElementById("userMessage").value = "";

    // Mostra caricamento
    box.innerHTML += "<div id='loading'><b>NEURA:</b> Sto elaborando...</div>";
    box.scrollTop = box.scrollHeight;

    // Chiamata reale alla tua API
    const response = await fetch("/api/neura", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            input: msg,
            tono: "professionale"
        })
    });

    const data = await response.json();
    const reply = data.risposta || "Errore nella risposta di NEURA.";

    // Rimuove il caricamento
    document.getElementById("loading").remove();

    // Mostra risposta reale
    box.innerHTML += "<div><b>NEURA:</b> " + reply + "</div>";
    box.scrollTop = box.scrollHeight;
}
</script>

<script src="chat.js"></script>
